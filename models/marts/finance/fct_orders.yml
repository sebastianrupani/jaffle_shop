models:
  - name: fct_orders
    config: 
      contract: 
        enforced: true
      group: finance
      access: protected
    latest_version: 1
    columns:
      - name: order_id
        data_type: number
        constraints:
          - type: not_null
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
        data_type: number
      - name: order_date
        data_type: date
      - name: amount
        data_type: number
        data_tests:
          - average_dollars_spent_greater_than_one:
              arguments: 
                group_by_column: customer_id
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              row_condition: 'order_id is not null'
              strictly: false
          - dbt_expectations.expect_column_mean_to_be_between:
              min_value: 1
              group_by: [customer_id] 
              row_condition: 'order_id is not null'
              strictly: false
    versions:
      - v: 1
        config: 
          alias: fct_orders
      - v: 2
        columns:
          - include: all
            exclude: [order_date, amount]
          - name: location_ordered_at
            data_type: date
          - name: order_amount
            data_type: number