version: 2

models:
  - name: int_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__orders')
                field: order_id

  - name: int_orders__pivoted
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__orders')
                field: order_id