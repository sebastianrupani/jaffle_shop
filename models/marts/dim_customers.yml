models:
  - name: dim_customers
    config: 
      contract: 
        enforced: true
    columns:
      - name: customer_id
        data_type: number
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
          - dbt_utils.cardinality_equality:
              field: customer_id
              to: ref('stg_jaffle_shop__customers')
      - name: first_name
        data_type: varchar
      - name: last_name
        data_type: varchar
      - name: first_order_date
        data_type: date
      - name: most_recent_order_date
        data_type: date
      - name: number_of_orders
        data_type: number
      - name: lifetime_value
        data_type: number